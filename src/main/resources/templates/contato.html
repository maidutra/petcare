<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - PetCare</title>
    <!-- Importação do CSS mapeada para a pasta static -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <!-- Inclusão do fragmento do Header -->
    <div th:replace="~{fragments/header :: header}"></div>

    <main class="contato-page">
        <section class="page-header">
            <h1>Fale <span>Conosco</span></h1>
            <p>Estamos à disposição para atender você e seu pet.</p>
        </section>

        <section class="contato-container">
            <!-- Estrutura mantida para compatibilidade com o seu CSS -->
            <div class="contato-cards-wrapper">
                
                <div class="info-card-simple">
                    <span class="card-icon">📍</span>
                    <h3>Endereço</h3>
                    <p>CL 116 Conjunto W, 67<br>Santa Maria - Brasília / DF</p>
                </div>

                <div class="info-card-simple">
                    <span class="card-icon">📞</span>
                    <h3>Telefone</h3>
                    <p>(61) 9999-2222</p>
                </div>

                <div class="info-card-simple">
                    <span class="card-icon">✉️</span>
                    <h3>E-mail</h3>
                    <p>contato@petcare.com.br</p>
                </div>

                <div class="info-card-simple">
                    <span class="card-icon">⏰</span>
                    <h3>Horários</h3>
                    <p>Segunda a Sexta: 09h às 18h<br>Sábados: 08h às 14h</p>
                </div>

            </div>
        </section>
    </main>

    <!-- Inclusão do fragmento do Footer -->
    <div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
