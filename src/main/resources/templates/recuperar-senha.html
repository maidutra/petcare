<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - PetCare</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div th:replace="~{fragments/header :: header}"></div>

    <main class="auth-page">
        <div class="auth-card">
            <h2>Recuperar <span>Senha</span></h2>
            <p>Insira seu e-mail para receber as instruções de recuperação.</p>

            <div th:if="${param.sucesso}" class="alert alert-success" style="color: #28a745; margin-bottom: 15px;">
                Se este e-mail estiver cadastrado, você receberá as instruções em breve.
            </div>

            <form th:action="@{/recuperar-senha}" method="POST">
                <div class="form-group">
                    <label for="email">E-mail Cadastrado</label>
                    <input type="email" id="email" name="email" placeholder="exemplo@email.com" required>
                </div>

                <button type="submit" class="btn-agendar-roxo" style="width: 100%; margin-top: 10px;">
                    ENVIAR LINK DE RECUPERAÇÃO
                </button>
            </form>

            <div class="auth-footer">
                <p>Lembrou a senha? <a th:href="@{/login}">Voltar para o login</a></p>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
